services:
  mysql:
    image: mysql:8.0
    container_name: meditrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: agrawalmm_3
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pagrawalmm_3"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build:
      context: ./eurekaserver
    container_name: meditrack-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"

  auth-service:
    build:
      context: ./authservice
    container_name: meditrack-auth
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hms_auth_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: agrawalmm_3
    ports:
      - "8081:8081"

  patient-service:
    build:
      context: ./patientservice
    container_name: meditrack-patient
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hms_patient?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: agrawalmm_3
    ports:
      - "8082:8082"

  api-gateway:
    build:
      context: ./apigatewayservice/apigateway
    container_name: meditrack-gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_started
      auth-service:
        condition: service_started
      patient-service:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"

  hms-frontend:
    build:
      context: ./hms-frontend
    container_name: meditrack-frontend
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"

volumes:
  mysql_data:
