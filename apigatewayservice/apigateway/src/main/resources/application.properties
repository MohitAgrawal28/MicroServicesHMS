spring.application.name=api-gateway
server.port=${PORT:8080}

eureka.client.enabled=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
jwt.secret=${JWT_SECRET:YourSuperSecretKeyForJWTTokenGeneration1234567890}

# Route 1: Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://${AUTH_SERVICE_HOSTPORT:localhost:8081}}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Route 2: Patient Service
spring.cloud.gateway.routes[1].id=patient-service
spring.cloud.gateway.routes[1].uri=${PATIENT_SERVICE_URL:http://${PATIENT_SERVICE_HOSTPORT:localhost:8082}}
spring.cloud.gateway.routes[1].predicates[0]=Path=/patients/**

# FIRST: Authenticate using the full intact path (/patients/patient-db-test)
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# SECOND: Strip the prefix so port 8082 gets just (/patient-db-test)
spring.cloud.gateway.routes[1].filters[1]=StripPrefix=1

# Global CORS Configuration for Frontend App
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
